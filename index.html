</head>
<body>
    <!-- Vùng chứa ứng dụng React -->
    <div id="root"></div>

    <!-- Mã nguồn ứng dụng (Sử dụng module để import thư viện ESM) -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { 
            Map as MapIcon, Layers, Plus, Trash2, Edit2, Save, X, 
            Crosshair, MapPin, Hexagon, Database, Settings, ChevronRight, Check, Activity,
            Info, Download, Upload, Sliders, Target, Eye, EyeOff, CornerDownRight,
            Search, Loader2, Image as ImageIcon, Calendar, User, ListTodo, PlusCircle,
            AlertTriangle, Siren, AlertCircle, CheckCircle, LogOut, UserCircle, Shield, Key,
            Users, UserCog, Bell, Navigation, Ruler
        } from 'https://esm.sh/lucide-react@0.292.0';       

        // --- MOCK DATABASE TÀI KHOẢN ---
        const INITIAL_USERS = [
        { id: 'u1', username: 'admin', password: '123', role: 'admin', fullName: 'Quản trị viên Hệ thống' },
        { id: 'u4', username: 'lanhdao', password: '123', role: 'approver', fullName: ' ' },
        { id: 'u2', username: 'kysu', password: '123', role: 'editor', fullName: 'Kỹ sư Hiện trường' },
        { id: 'u3', username: 'khach', password: '123', role: 'viewer', fullName: 'Khách Tham quan' }
        ];

        // --- DỮ LIỆU MẪU BAN ĐẦU ---
        const INITIAL_LAYERS = [
        {
            id: 'layer-1',
            name: 'Đường băng (Runway)',
            type: 'polygon',
            color: '#ef4444', 
            visible: true,
            parentId: null,
            fields: [
            { id: 'f-1', name: 'Mã đường băng', type: 'text' },
            { id: 'f-2', name: 'Chiều dài (m)', type: 'number' },
            { id: 'f-3', name: 'Bề mặt', type: 'text' }
            ]
        },
        {
            id: 'layer-1-1',
            name: 'Đèn tín hiệu đường băng',
            type: 'point',
            color: '#facc15', 
            visible: true,
            parentId: 'layer-1',
            fields: [
            { id: 'f-8', name: 'Loại đèn', type: 'text' }
            ]
        },
        {
            id: 'layer-2',
            name: 'Sân đỗ máy bay (Apron)',
            type: 'polygon',
            color: '#3b82f6', 
            visible: true,
            parentId: null,
            fields: [
            { id: 'f-4', name: 'Khu vực', type: 'text' },
            { id: 'f-5', name: 'Sức chứa (tàu bay)', type: 'number' }
            ]
        },
        {
            id: 'layer-3',
            name: 'Đài kiểm soát không lưu',
            type: 'point',
            color: '#eab308', 
            visible: true,
            parentId: null,
            fields: [
            { id: 'f-6', name: 'Chiều cao (m)', type: 'number' },
            { id: 'f-7', name: 'Tình trạng', type: 'text' }
            ]
        }
        ];

        const INITIAL_FEATURES = [
        {
            id: 'feat-1',
            layerId: 'layer-1',
            coordinates: [
            [21.0640, 106.1750],
            [21.0660, 106.1755],
            [21.0620, 106.1950],
            [21.0600, 106.1945]
            ],
            properties: { 'f-1': 'RWY-01', 'f-2': '3000', 'f-3': 'Bê tông nhựa' },
            progress: 60,
            status: '       ',
            imageUrl: 'https://images.unsplash.com/photo-1464037866556-6812c9d1c72e?auto=format&fit=crop&q=80&w=400',
            tasks: [
            { id: 't-1', name: 'San lấp mặt bằng', contractor: 'Tổng công ty ACC', startDate: '2026-01-01', endDate: '2026-03-01', progress: 100, status: 'Hoàn thành' },
            { id: 't-2', name: 'Đổ bê tông đường băng', contractor: 'Tập đoàn CIENCO', startDate: '2026-03-15', endDate: '2026-10-01', progress: 20, status: 'Đang thi công' }
            ]
        }
        ];

        const INITIAL_INCIDENTS = [
        {
            id: 'inc-1',
            title: 'Lún nứt bề mặt đường băng cục bộ',
            description: 'Phát hiện vết nứt dài 2m, rộng 5cm tại khu vực đầu đường băng. Cần xử lý sớm trước mùa mưa.',
            level: 'Nghiêm trọng', 
            status: 'Đang xử lý', 
            date: '2026-06-10',
            coordinates: [21.0650, 106.1752],
            reporter: 'Nguyễn Văn A - Ban An Toàn'
        }
        ];

        const INITIAL_PROJECT_INFO = {
        title: 'Cảng Hàng Không Gia Bình',
        description: 'Dự án xây dựng Cảng hàng không Gia Bình nằm tại huyện Gia Bình, tỉnh Bắc Ninh. Đây là dự án hạ tầng giao thông trọng điểm, kết hợp phục vụ mục đích an ninh quốc phòng, lực lượng Cảnh sát cơ động và thúc đẩy phát triển kinh tế - xã hội vùng thủ đô.',
        imageUrl: 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80&w=800',
        location: 'Xã Xuân Lai, H. Gia Bình, Bắc Ninh',
        scale: 'Cấp 4C / Sân bay quân sự cấp 1',
        area: '~ 125 Hecta',
        investor: 'Bộ Tư lệnh Cảnh sát Cơ động',
        targets: [
            'Phục vụ hoạt động bay của lực lượng Công an nhân dân, sẵn sàng chiến đấu, phòng chống khủng bố, cứu nạn cứu hộ.',
            'Làm sân bay dự bị cho cụm cảng hàng không miền Bắc.',
            'Sẵn sàng chuyển đổi phục vụ lưỡng dụng (kết hợp dân sự) khi có yêu cầu thực tế, thúc đẩy kinh tế địa phương.'
        ]
        };

        function App() {
            // --- STATES ---
            const [currentUser, setCurrentUser] = useState(null); 
            const [usersDb, setUsersDb] = useState(INITIAL_USERS);
            const [authMode, setAuthMode] = useState('login'); 
            const [authForm, setAuthForm] = useState({ username: '', password: '', fullName: '' });
            const [authError, setAuthError] = useState('');

            const [layers, setLayers] = useState(INITIAL_LAYERS);
            const [features, setFeatures] = useState(INITIAL_FEATURES);
            const [incidents, setIncidents] = useState(INITIAL_INCIDENTS);
            const [activeTab, setActiveTab] = useState('data'); 
            
            // Trạng thái vẽ bản đồ
            const [isDrawing, setIsDrawing] = useState(false);
            const [activeLayerId, setActiveLayerId] = useState(INITIAL_LAYERS[0]?.id || null);
            const [drawingCoords, setDrawingCoords] = useState([]);
            const [isReportingIncident, setIsReportingIncident] = useState(false);
            
            // Trạng thái CÔNG CỤ BẢN ĐỒ (Map Tools)
            const [isMeasuring, setIsMeasuring] = useState(false);
            const [measurePoints, setMeasurePoints] = useState([]);
            const [measureCursor, setMeasureCursor] = useState(null);
            const [quickAddTool, setQuickAddTool] = useState(null); 
            
            // Trạng thái hiển thị thông tin
            const [selectedFeatureId, setSelectedFeatureId] = useState(null);
            const selectedFeatureInfo = features.find(f => f.id === selectedFeatureId);

            // Trạng thái cấu hình Quản trị
            const [mapConfig, setMapConfig] = useState({ lat: 21.0600, lng: 106.1850, zoom: 14 });

            // Tọa độ chuột
            const [mouseCoords, setMouseCoords] = useState(null);

            // Trạng thái tìm kiếm
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [activeSearchBoundary, setActiveSearchBoundary] = useState(null);

            // Trạng thái THÔNG BÁO & CẢNH BÁO
            const [notifications, setNotifications] = useState([
                { id: 'notif-1', title: 'Hệ thống đã sẵn sàng', message: 'Chào mừng đến với hệ thống bản đồ số.', type: 'info', time: new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }), read: false }
            ]);
            const [showNotifPanel, setShowNotifPanel] = useState(false);
            const [activeToastAlert, setActiveToastAlert] = useState(null); 

            // Trạng thái Giới thiệu Dự án
            const [projectInfo, setProjectInfo] = useState(INITIAL_PROJECT_INFO);
            const [showProjectInfo, setShowProjectInfo] = useState(false);
            const [isEditingProjectInfo, setIsEditingProjectInfo] = useState(false);
            const [tempProjectInfo, setTempProjectInfo] = useState(null);
            const [showOverallProgressDetails, setShowOverallProgressDetails] = useState(false); 

            // Trạng thái Modals
            const [editingLayer, setEditingLayer] = useState(null);
            const [editingFeature, setEditingFeature] = useState(null);
            const [editingProgressFeature, setEditingProgressFeature] = useState(null);
            const [editingIncident, setEditingIncident] = useState(null);
            const [editingUser, setEditingUser] = useState(null);
            const [isAddingProgressItem, setIsAddingProgressItem] = useState(false);
            const [newProgressItemData, setNewProgressItemData] = useState({ layerId: '', name: '' });
            const [tempTasks, setTempTasks] = useState([]);
            const [mapReady, setMapReady] = useState(false);
            const [isGeneratingTasks, setIsGeneratingTasks] = useState(false);
            const [isAnalyzingIncident, setIsAnalyzingIncident] = useState(false);

            // --- QUẢN LÝ QUYỀN TRUY CẬP (RBAC) ---
            const isAdmin = currentUser?.role === 'admin';
            const isApprover = currentUser?.role === 'approver';
            const canEdit = isAdmin || isApprover || currentUser?.role === 'editor';

            // --- HÀM XỬ LÝ AUTH ---
            const handleLogin = (e) => {
                e.preventDefault();
                const user = usersDb.find(u => u.username === authForm.username && u.password === authForm.password);
                if (user) {
                setCurrentUser(user);
                setAuthError('');
                setActiveTab(user.role === 'admin' ? 'layers' : 'data');
                } else {
                setAuthError('Tài khoản hoặc mật khẩu không chính xác!');
                }
            };

            const handleRegister = (e) => {
                e.preventDefault();
                if (!authForm.username || !authForm.password || !authForm.fullName) {
                setAuthError('Vui lòng điền đầy đủ thông tin!');
                return;
                }
                if (usersDb.some(u => u.username === authForm.username)) {
                setAuthError('Tên đăng nhập đã tồn tại!');
                return;
                }
                const newUser = {
                id: Date.now().toString(),
                username: authForm.username,
                password: authForm.password,
                fullName: authForm.fullName,
                role: 'viewer' 
                };
                setUsersDb([...usersDb, newUser]);
                setCurrentUser(newUser);
                setAuthError('');
                setActiveTab('data');
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setAuthForm({ username: '', password: '', fullName: '' });
            };

            // --- HÀM XỬ LÝ AI (GEMINI API) ---
            const handleAITaskBreakdown = async () => {
                if (!editingProgressFeature) return;
                setIsGeneratingTasks(true);
                const featureName = Object.values(editingProgressFeature.properties)[0] || 'Đối tượng chưa rõ';
                const layerName = layers.find(l => l.id === editingProgressFeature.layerId)?.name || '';

                const prompt = `Phân tích bóc tách hạng mục công việc xây dựng sân bay cho đối tượng: "${featureName}" thuộc nhóm "${layerName}". Tạo ra 3-5 đầu việc con thực tế, hợp logic thi công. Hôm nay là năm 2026.`;

                try {
                // CHÚ Ý: Nếu chạy thực tế trên máy, bạn cần dán API Key của Google Gemini vào biến apiKey bên dưới
                const apiKey = "";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "Bạn là chuyên gia tư vấn quản lý dự án xây dựng sân bay hạng nặng." }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                        type: "ARRAY",
                        items: {
                            type: "OBJECT",
                            properties: {
                            name: { type: "STRING" },
                            contractor: { type: "STRING" },
                            startDate: { type: "STRING" },
                            endDate: { type: "STRING" }
                            },
                            required: ["name", "contractor", "startDate", "endDate"]
                        }
                        }
                    }
                    })
                });
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) {
                    const aiTasks = JSON.parse(text);
                    const formattedTasks = aiTasks.map(t => ({
                    id: Date.now().toString() + Math.random(),
                    name: t.name,
                    contractor: t.contractor,
                    startDate: t.startDate || new Date().toISOString().split('T')[0],
                    endDate: t.endDate || new Date().toISOString().split('T')[0],
                    progress: 0,
                    status: 'Chưa bắt đầu'
                    }));
                    setTempTasks(prev => [...prev, ...formattedTasks]);
                    triggerNotification('AI đã hoàn tất', 'Đã thêm các đầu việc gợi ý từ Gemini', 'success');
                }
                } catch (e) {
                console.error(e);
                triggerNotification('Lỗi AI', 'Không thể bóc tách công việc lúc này do lỗi kết nối hoặc chưa nhập API Key.', 'warning');
                } finally {
                setIsGeneratingTasks(false);
                }
            };

            const handleAIIncidentAnalysis = async () => {
                if (!editingIncident || !editingIncident.description) {
                alert("Vui lòng nhập mô tả sự cố để AI phân tích!");
                return;
                }
                setIsAnalyzingIncident(true);
                const prompt = `Phân tích sự cố tại công trường sân bay: Tiêu đề: "${editingIncident.title}". Mô tả: "${editingIncident.description}". Đề xuất nguyên nhân gốc rễ và hướng giải quyết hiệu quả nhất.`;
                
                try {
                // CHÚ Ý: Nếu chạy thực tế trên máy, bạn cần dán API Key của Google Gemini vào biến apiKey bên dưới
                const apiKey = "";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "Bạn là chuyên gia an toàn lao động và kỹ sư quản lý rủi ro công trường." }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                        type: "OBJECT",
                        properties: {
                            rootCause: { type: "STRING", description: "Nguyên nhân gốc rễ dự đoán" },
                            actionPlan: { type: "STRING", description: "Kế hoạch hành động đề xuất" },
                            suggestedLevel: { type: "STRING", description: "Chọn một trong: Thấp, Trung bình, Nghiêm trọng" }
                        },
                        required: ["rootCause", "actionPlan", "suggestedLevel"]
                        }
                    }
                    })
                });
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) {
                    const aiAnalysis = JSON.parse(text);
                    const newDesc = `[AI PHÂN TÍCH]\n- Nguyên nhân dự đoán: ${aiAnalysis.rootCause}\n- Đề xuất xử lý: ${aiAnalysis.actionPlan}\n\n[MÔ TẢ GỐC]\n${editingIncident.description}`;
                    setEditingIncident({
                    ...editingIncident,
                    description: newDesc,
                    level: ['Thấp', 'Trung bình', 'Nghiêm trọng'].includes(aiAnalysis.suggestedLevel) ? aiAnalysis.suggestedLevel : editingIncident.level
                    });
                    triggerNotification('AI đã phân tích', 'Đã cập nhật gợi ý xử lý sự cố an toàn', 'success');
                }
                } catch(e) {
                console.error(e);
                triggerNotification('Lỗi AI', 'Không thể phân tích sự cố lúc này do lỗi kết nối hoặc chưa nhập API Key.', 'warning');
                } finally {
                setIsAnalyzingIncident(false);
                }
            };

            // --- HÀM XỬ LÝ CÔNG CỤ BẢN ĐỒ ---
            const handleMyLocation = () => {
                if (!navigator.geolocation) {
                triggerNotification('Lỗi', 'Trình duyệt của bạn không hỗ trợ định vị GPS.', 'warning');
                return;
                }
                
                triggerNotification('Đang định vị...', 'Đang tìm kiếm vị trí của bạn.', 'info');
                navigator.geolocation.getCurrentPosition(
                (pos) => {
                    if (mapInstance.current) {
                    mapInstance.current.flyTo([pos.coords.latitude, pos.coords.longitude], 16);
                    if (window.myLocationMarker) {
                        mapInstance.current.removeLayer(window.myLocationMarker);
                    }
                    window.myLocationMarker = window.L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
                        color: '#fff', weight: 2, fillColor: '#3b82f6', fillOpacity: 1, radius: 8
                    }).addTo(mapInstance.current).bindTooltip('Vị trí của bạn', { permanent: true, direction: 'top' });
                    }
                },
                (err) => triggerNotification('Lỗi định vị', 'Không thể lấy vị trí: ' + err.message, 'warning'),
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            };

            const formatDistance = (meters) => {
                if (meters < 1000) return Math.round(meters) + ' m';
                return (meters / 1000).toFixed(2) + ' km';
            };

            // --- HÀM XỬ LÝ THÔNG BÁO ---
            const triggerNotification = (title, message, type = 'info', requireAlert = false) => {
                const newNotif = {
                id: Date.now().toString(),
                title,
                message,
                type, 
                time: new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }),
                read: false
                };
                setNotifications(prev => [newNotif, ...prev]);

                if (requireAlert || type === 'warning') {
                setActiveToastAlert(newNotif);
                setTimeout(() => setActiveToastAlert(null), 6000); 
                }
            };

            const markAllNotificationsRead = () => {
                setNotifications(notifications.map(n => ({ ...n, read: true })));
            };

            // --- HELPERS LỚP DỮ LIỆU ---
            const isLayerVisible = (layerId, allLayers = layers) => {
                const layer = allLayers.find(l => l.id === layerId);
                if (!layer) return false;
                if (layer.visible === false) return false;
                if (layer.parentId) return isLayerVisible(layer.parentId, allLayers); 
                return true;
            };

            const getDescendantIds = (layerId, allLayers = layers) => {
                const children = allLayers.filter(l => l.parentId === layerId);
                let ids = children.map(c => c.id);
                children.forEach(c => { ids = [...ids, ...getDescendantIds(c.id, allLayers)] });
                return ids;
            };

            const handleToggleLayerVisibility = (id) => {
                setLayers(layers.map(l => l.id === id ? { ...l, visible: l.visible === false ? true : false } : l));
            };

            // --- REFS ---
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const featureLayersRef = useRef(null);
            const tempLayerRef = useRef(null);
            const incidentLayersRef = useRef(null);
            const searchBoundaryLayerRef = useRef(null); 
            const measureLayerRef = useRef(null); 
            const fileInputRef = useRef(null);
            const layersRef = useRef(layers);
            const appStateRef = useRef({ 
                isDrawing, activeLayerId, setEditingFeature, setIsDrawing, setDrawingCoords, setSelectedFeatureId, 
                isReportingIncident, setEditingIncident, setIsReportingIncident, setActiveSearchBoundary,
                isMeasuring, setMeasurePoints, setMeasureCursor 
            });

            useEffect(() => { layersRef.current = layers; }, [layers]);
            useEffect(() => {
                appStateRef.current = { 
                isDrawing, activeLayerId, setEditingFeature, setIsDrawing, setDrawingCoords, setSelectedFeatureId, 
                isReportingIncident, setEditingIncident, setIsReportingIncident, setActiveSearchBoundary,
                isMeasuring, setMeasurePoints, setMeasureCursor
                };
                if (mapRef.current) {
                mapRef.current.style.cursor = (isDrawing || isReportingIncident || isMeasuring) ? 'crosshair' : '';
                }
            }, [isDrawing, activeLayerId, isReportingIncident, isMeasuring]);

            // --- XỬ LÝ TÌM KIẾM ---
            useEffect(() => {
                const timeoutId = setTimeout(() => {
                if (searchQuery.trim().length > 2) {
                    performSearch(searchQuery);
                } else {
                    setSearchResults([]);
                }
                }, 600);

                return () => clearTimeout(timeoutId);
            }, [searchQuery, features]);

            const performSearch = async (query) => {
                setIsSearching(true);
                let results = [];

                const coordRegex = /^([-+]?\d{1,2}(?:\.\d+)?)[,\s]+([-+]?\d{1,3}(?:\.\d+)?)$/;
                const match = query.match(coordRegex);
                if (match) {
                results.push({
                    type: 'coordinate',
                    title: `Tọa độ: ${match[1]}, ${match[2]}`,
                    subtitle: 'Đến vị trí bản đồ',
                    lat: parseFloat(match[1]),
                    lng: parseFloat(match[2])
                });
                }

                const lowerQuery = query.toLowerCase();
                features.forEach(f => {
                if (!isLayerVisible(f.layerId)) return;
                
                const isMatch = Object.values(f.properties).some(val => 
                    String(val).toLowerCase().includes(lowerQuery)
                );
                
                if (isMatch) {
                    const layer = layers.find(l => l.id === f.layerId);
                    let centerLat = null, centerLng = null;
                    
                    if (f.coordinates && f.coordinates.length > 0) {
                    if (layer?.type === 'point' && f.coordinates.length === 2) {
                        centerLat = f.coordinates[0];
                        centerLng = f.coordinates[1];
                    } else if (Array.isArray(f.coordinates[0])) {
                        centerLat = f.coordinates[0][0];
                        centerLng = f.coordinates[0][1];
                    }
                    }

                    results.push({
                    type: 'feature',
                    id: f.id,
                    title: Object.values(f.properties)[0] || 'Đối tượng chưa đặt tên',
                    subtitle: `Thuộc lớp: ${layer?.name}${centerLat === null ? ' (Chưa có vị trí)' : ''}`,
                    lat: centerLat,
                    lng: centerLng
                    });
                }
                });

                try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=3&countrycodes=vn&polygon_geojson=1`);
                const data = await res.json();
                data.forEach(item => {
                    results.push({
                    type: 'place',
                    title: item.display_name,
                    subtitle: 'Địa danh thực tế',
                    lat: parseFloat(item.lat),
                    lng: parseFloat(item.lon),
                    geojson: item.geojson
                    });
                });
                } catch (e) {
                console.error('Lỗi tìm kiếm địa danh', e);
                }

                setSearchResults(results);
                setIsSearching(false);
            };

            const handleSelectSearchResult = (result) => {
                if (mapInstance.current) {
                if (result.geojson) {
                    setActiveSearchBoundary(result.geojson);
                } else {
                    setActiveSearchBoundary(null);
                    if (result.lat !== null && result.lng !== null) {
                    mapInstance.current.setView([result.lat, result.lng], 17);
                    }
                }
                
                if (result.type === 'feature') {
                    setSelectedFeatureId(result.id);
                } else {
                    setSelectedFeatureId(null);
                }
                }
                setSearchQuery('');
                setSearchResults([]);
            };

            // --- KHỞI TẠO BẢN ĐỒ LEAFLET ---
            useEffect(() => {
                if (!currentUser || !mapRef.current) return;

                const initMap = () => {
                if (mapInstance.current) return;

                const map = window.L.map(mapRef.current, { zoomControl: false }).setView([mapConfig.lat, mapConfig.lng], mapConfig.zoom);

                    maxZoom: 19,
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                });

                const satelliteLayer = window.L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    maxZoom: 19,
                    attribution: 'Tiles &copy; Esri &mdash; Cảng HKQT Gia Bình'
                });

                streetLayer.addTo(map);

                window.L.control.layers({
                    "🗺️ Bản đồ Đường phố": streetLayer,

                featureLayersRef.current = window.L.layerGroup().addTo(map);
                tempLayerRef.current = window.L.layerGroup().addTo(map);
                incidentLayersRef.current = window.L.layerGroup().addTo(map);
                searchBoundaryLayerRef.current = window.L.layerGroup().addTo(map); 
                measureLayerRef.current = window.L.layerGroup().addTo(map);

                map.on('click', (e) => {
                    const state = appStateRef.current;

                    if (state.isReportingIncident) {
                    state.setEditingIncident({
                        id: Date.now().toString(),
                        title: '',
                        description: '',
                        level: 'Trung bình',
                        status: 'Chưa xử lý',

                        reporter: currentUser?.fullName || ''
                    });
                    state.setIsReportingIncident(false);
                    return;
                    }

                    if (state.isMeasuring) {
                    state.setMeasurePoints(prev => [...prev, e.latlng]);
                    return;
                    }

                    if (!state.isDrawing) {
                    state.setSelectedFeatureId(null); 
                    state.setActiveSearchBoundary(null); 
                    setQuickAddTool(null);
                    return;
                    }

                    const layer = layersRef.current.find(l => l.id === state.activeLayerId);
                    if (!layer) return;

                    if (layer.type === 'point') {
                    state.setEditingFeature({
                        id: Date.now().toString(),
                        layerId: layer.id,
                        coordinates: [e.latlng.lat, e.latlng.lng],
                        properties: {},
                        progress: 0,
                        status: 'Chưa bắt đầu'
                    });
                    state.setIsDrawing(false);
                    } else if (layer.type === 'polygon') {
                    state.setDrawingCoords(prev => [...prev, [e.latlng.lat, e.latlng.lng]]);
                    }
                });

                map.on('mousemove', (e) => {
                    setMouseCoords({
                    lat: e.latlng.lat.toFixed(5),
                    lng: e.latlng.lng.toFixed(5)
                    });

                    if (appStateRef.current.isMeasuring) {
                    appStateRef.current.setMeasureCursor(e.latlng);
                    }
                });

                map.on('mouseout', () => {
                    setMouseCoords(null);
                    appStateRef.current.setMeasureCursor(null);
                });

                mapInstance.current = map;
                setMapReady(true);
                
                // KHẮC PHỤC LỖI HIỂN THỊ: Cập nhật lại kích thước bản đồ sau khi load xong DOM
                setTimeout(() => {
                    if (mapInstance.current) {
                        mapInstance.current.invalidateSize();
                    }

            };

            // Lắng nghe sự kiện thay đổi kích thước màn hình

                }
            };
            window.addEventListener('resize', handleResize);

            if (!window.L) {
                if (!document.getElementById('leaflet-script')) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
                    document.head.appendChild(link);

                    const script = document.createElement('script');
                    script.id = 'leaflet-script';
                    script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';

                    document.head.appendChild(script);

                    document.getElementById('leaflet-script').addEventListener('load', initMap);
                }

            return () => {
                window.removeEventListener('resize', handleResize);
                if (mapInstance.current) {
                    mapInstance.current.remove();

                }

                    tooltipContent += `

                        <span style="color: ${taskColor}; font-weight: bold; flex-shrink: 0; background: #f8fafc; padding: 1px 4px; border-radius: 4px; border: 1px solid #e2e8f0;">${task.progress || 0}%</span>
                        </div>
                    `;
                    });
                    tooltipContent += `</div>`;
                }
                
                tooltipContent += `</div>`;
                
                leafletLayer.bindTooltip(tooltipContent, { className: 'bg-white/90 backdrop-blur shadow-lg border-0 rounded p-2' });

                leafletLayer.on('click', (e) => {
                    window.L.DomEvent.stopPropagation(e);
                    if (!appStateRef.current.isDrawing && !appStateRef.current.isMeasuring) {
                    appStateRef.current.setSelectedFeatureId(feature.id);

                drawingCoords.forEach(coord => {
                    window.L.circleMarker(coord, { color: '#ffffff', fillColor: color, fillOpacity: 1, radius: 4, weight: 2 }).addTo(tempLayerRef.current);
                });

                if (drawingCoords.length > 1) {
                    window.L.polyline(drawingCoords, { color, dashArray: '5, 5', weight: 2 }).addTo(tempLayerRef.current);
                }
                if (drawingCoords.length > 2) {
                    window.L.polygon(drawingCoords, { color, fillColor: color, fillOpacity: 0.2, weight: 1 }).addTo(tempLayerRef.current);
                }
                }
            }, [drawingCoords, layers, activeLayerId, mapReady]);

            // --- RENDER ĐO KHOẢNG CÁCH (MEASURE TOOL) ---
            useEffect(() => {
                if (!mapReady || !window.L || !measureLayerRef.current) return;
                measureLayerRef.current.clearLayers();

                if (measurePoints.length > 0) {
                const latlngs = measurePoints.map(p => [p.lat, p.lng]);

                if (latlngs.length > 1) {
                    window.L.polyline(latlngs, { color: '#f59e0b', weight: 3, dashArray: '4, 6' }).addTo(measureLayerRef.current);
                }

                latlngs.forEach(coord => {
                    window.L.circleMarker(coord, { color: '#f59e0b', fillColor: '#fff', fillOpacity: 1, radius: 5, weight: 2 }).addTo(measureLayerRef.current);
                });

                if (isMeasuring && measureCursor) {
                    const dynamicLine = [latlngs[latlngs.length - 1], [measureCursor.lat, measureCursor.lng]];
                    window.L.polyline(dynamicLine, { color: '#f59e0b', weight: 3, dashArray: '4, 6', opacity: 0.5 }).addTo(measureLayerRef.current);

                    let dist = 0;
                    for(let i=0; i<measurePoints.length-1; i++) {
                        dist += mapInstance.current.distance(measurePoints[i], measurePoints[i+1]);
                    }
                    dist += mapInstance.current.distance(measurePoints[measurePoints.length-1], measureCursor);

                    const tooltipText = formatDistance(dist);
                    window.L.tooltip({ permanent: true, className: 'bg-amber-50 text-amber-700 font-bold border border-amber-400 shadow-md', direction: 'right', offset: [10, 0] })
                    .setLatLng(measureCursor)
                    .setContent(`Tổng: ${tooltipText}`)
                    .addTo(measureLayerRef.current);
                }
                }
            }, [measurePoints, measureCursor, isMeasuring, mapReady]);

            // --- RENDER ĐƯỜNG BAO ĐỊA GIỚI HÀNH CHÍNH TÌM KIẾM ---
            useEffect(() => {
                if (!mapReady || !window.L || !searchBoundaryLayerRef.current) return;
                searchBoundaryLayerRef.current.clearLayers();

                if (activeSearchBoundary) {
                const geojsonLayer = window.L.geoJSON(activeSearchBoundary, {
                    style: {
                    color: '#3b82f6', 
                    weight: 3,
                    opacity: 0.8,
                    fillColor: '#3b82f6',
                    fillOpacity: 0.1,
                    dashArray: '5, 8'
                    }

            }, [activeSearchBoundary, mapReady]);

                if (idsToDelete.includes(activeLayerId)) setActiveLayerId(layers.filter(l => !idsToDelete.includes(l.id))[0]?.id || null);
                if (idsToDelete.includes(selectedFeatureInfo?.layerId)) setSelectedFeatureId(null);

                    setLayers(data.layers);

                            <X className="w-5 h-5" />
                        </button>
                        </div>
                        
                        <div className="p-5 overflow-y-auto flex-1 space-y-4">
                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Tên vụ việc *</label>
                            <input 
                            type="text" 
                            className="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-red-500 outline-none bg-slate-50 focus:bg-white"
                            value={editingIncident.title}
                            onChange={e => setEditingIncident({...editingIncident, title: e.target.value})}
                            placeholder="Mô tả ngắn gọn sự cố..."
                            />
                        </div>

                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Mô tả chi tiết</label>
                            <textarea 
                            className="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-red-500 outline-none bg-slate-50 focus:bg-white min-h-[120px]"
                            value={editingIncident.description}
                            onChange={e => setEditingIncident({...editingIncident, description: e.target.value})}
                            placeholder="Chi tiết tình trạng, nguyên nhân hoặc thiệt hại..."
                            />
                            <button 
                            onClick={handleAIIncidentAnalysis}
                            disabled={isAnalyzingIncident || !editingIncident.description}
                            className="mt-2 w-full py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-lg text-sm font-bold flex justify-center items-center gap-1.5 transition-colors disabled:opacity-50 border border-indigo-100"
                            >
                            {isAnalyzingIncident ? <Loader2 className="w-4 h-4 animate-spin" /> : '✨'} {isAnalyzingIncident ? 'AI Đang phân tích dữ liệu...' : 'Phân tích & Đề xuất xử lý'}
                            </button>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Mức độ nghiêm trọng</label>
                            <select 
                                className="w-full border rounded-lg p-2.5 text-sm outline-none bg-slate-50"
                                value={editingIncident.level}
                                onChange={e => setEditingIncident({...editingIncident, level: e.target.value})}
                            >
                                <option value="Thấp">Thấp</option>
                                <option value="Trung bình">Trung bình</option>
                                <option value="Nghiêm trọng">Nghiêm trọng</option>
                            </select>
                            </div>
                            <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Trạng thái xử lý</label>
                            <select 
                                className="w-full border rounded-lg p-2.5 text-sm outline-none bg-slate-50"
                                value={editingIncident.status}
                                onChange={e => setEditingIncident({...editingIncident, status: e.target.value})}
                            >
                                <option value="Chưa xử lý">Chưa xử lý</option>
                                <option value="Đang xử lý">Đang xử lý</option>
                                <option value="Đã giải quyết">Đã giải quyết</option>
                            </select>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Ngày phát hiện</label>
                            <input 
                                type="date" 
                                className="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-red-500 outline-none bg-slate-50"
                                value={editingIncident.date}
                                onChange={e => setEditingIncident({...editingIncident, date: e.target.value})}
                            />
                            </div>
                            <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Người báo cáo</label>
                            <input 
                                type="text" 
                                className="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-red-500 outline-none bg-slate-50 focus:bg-white"
                                value={editingIncident.reporter}
                                onChange={e => setEditingIncident({...editingIncident, reporter: e.target.value})}
                                placeholder="Tên / Đơn vị..."
                            />
                            </div>
                        </div>
                        
                        <div className="bg-slate-100 p-3 rounded-lg flex items-center justify-between text-xs text-slate-600 font-mono">
                            <span>Tọa độ (Lat, Lng):</span>
                            <strong>{editingIncident.coordinates[0].toFixed(5)}, {editingIncident.coordinates[1].toFixed(5)}</strong>
                        </div>
                        </div>

                        <div className="p-4 border-t bg-slate-50 rounded-b-xl flex justify-end gap-3">
                        <button onClick={() => setEditingIncident(null)} className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-lg">Hủy</button>
                        <button 
                            onClick={() => {
                            if (!editingIncident.title.trim()) return alert('Vui lòng nhập tên vụ việc!');
                            const exists = incidents.some(i => i.id === editingIncident.id);
                            if (exists) {
                                setIncidents(incidents.map(i => i.id === editingIncident.id ? editingIncident : i));
                                triggerNotification('Đã cập nhật sự cố', `Vụ việc: "${editingIncident.title}" đã được cập nhật tình trạng.`, 'info');
                            } else {
                                setIncidents([editingIncident, ...incidents]);
                                setActiveTab('incidents');
                                triggerNotification(`CẢNH BÁO SỰ CỐ MỚI`, `Vụ việc: "${editingIncident.title}" vừa được báo cáo tại công trường!`, 'warning', true);
                            }
                            setEditingIncident(null);
                            }} 
                            className="px-6 py-2 text-sm font-medium bg-red-600 hover:bg-red-700 text-white rounded-lg flex items-center gap-2 shadow-sm"
                        >
                            <Save className="w-4 h-4"/> Lưu Vụ Việc
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                {/* Modal Quản lý Tài khoản (User Editing) */}
                {editingUser && (
                    <div className="fixed inset-0 z-[9999] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-md flex flex-col max-h-[90vh]">
                        <div className="flex items-center justify-between p-4 border-b bg-blue-50 rounded-t-xl">
                        <div>
                            <h2 className="font-bold text-lg text-blue-800 flex items-center gap-2">
                            <UserCog className="w-5 h-5" /> {usersDb.some(u => u.id === editingUser.id) ? 'Sửa thông tin tài khoản' : 'Thêm tài khoản mới'}
                            </h2>
                        </div>
                        <button onClick={() => setEditingUser(null)} className="text-slate-400 hover:text-slate-700 p-1 bg-white rounded-full shadow-sm border border-slate-200">
                            <X className="w-5 h-5" />
                        </button>
                        </div>
                        
                        <div className="p-5 overflow-y-auto flex-1 space-y-4">
                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Họ và tên *</label>
                            <input 
                            type="text" 
                            className="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 focus:bg-white"
                            value={editingUser.fullName}
                            onChange={e => setEditingUser({...editingUser, fullName: e.target.value})}
                            placeholder="Nhập họ và tên..."
                            />
                        </div>

                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Tên đăng nhập *</label>
                            <input 
                            type="text" 
                            className="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 focus:bg-white"
                            value={editingUser.username}
                            onChange={e => setEditingUser({...editingUser, username: e.target.value})}
                            placeholder="Ví dụ: nva123"
                            disabled={usersDb.some(u => u.id === editingUser.id)} 
                            title={usersDb.some(u => u.id === editingUser.id) ? "Không thể thay đổi tên đăng nhập" : ""}
                            />
                        </div>

                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Mật khẩu *</label>
                            <input 
                            type="text" 
                            className="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 focus:bg-white"
                            value={editingUser.password}
                            onChange={e => setEditingUser({...editingUser, password: e.target.value})}
                            placeholder="Nhập mật khẩu..."
                            />
                        </div>

                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-1">Phân quyền tài khoản</label>
                            <select 
                            className="w-full border rounded-lg p-2.5 text-sm outline-none bg-slate-50"
                            value={editingUser.role}
                            onChange={e => setEditingUser({...editingUser, role: e.target.value})}
                            disabled={editingUser.id === currentUser.id} 
                            title={editingUser.id === currentUser.id ? "Không thể tự thay đổi quyền hạn của bản thân" : ""}
                            >
                            <option value="viewer">Viewer - Khách (Chỉ xem dữ liệu)</option>
                            <option value="editor">Editor - Kỹ sư (Thêm/Sửa đối tượng, tiến độ, sự cố)</option>
                            <option value="approver">Approver - Lãnh đạo (Phê duyệt, đánh giá)</option>
                            <option value="admin">Admin - Quản trị viên (Toàn quyền hệ thống)</option>
                            </select>
                            <p className="text-[11px] text-slate-500 mt-1.5 italic">
                            * Hệ thống cấm thay đổi quyền của chính bạn để tránh mất quyền quản trị.
                            </p>
                        </div>
                        </div>

                        <div className="p-4 border-t bg-slate-50 rounded-b-xl flex justify-end gap-3">
                        <button onClick={() => setEditingUser(null)} className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-lg">Hủy</button>
                        <button 
                            onClick={() => {
                            if (!editingUser.username.trim() || !editingUser.password.trim() || !editingUser.fullName.trim()) {
                                return alert('Vui lòng điền đầy đủ các trường bắt buộc!');
                            }
                            
                            const isExisting = usersDb.some(u => u.id === editingUser.id);
                            
                            if (!isExisting && usersDb.some(u => u.username === editingUser.username)) {
                                return alert('Tên đăng nhập này đã tồn tại trong hệ thống!');
                            }

                            if (isExisting) {
                                setUsersDb(usersDb.map(u => u.id === editingUser.id ? editingUser : u));
                                if (editingUser.id === currentUser.id) {
                                setCurrentUser(editingUser);
                                }
                            } else {
                                setUsersDb([...usersDb, editingUser]);
                            }
                            setEditingUser(null);
                            }} 
                            className="px-6 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg flex items-center gap-2 shadow-sm"
                        >
                            <Save className="w-4 h-4"/> Lưu Tài Khoản
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
